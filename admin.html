<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 페이지</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="toast" class="toast hidden" role="alert" aria-live="assertive"></div>

  <div id="app">
    <header class="topbar">
      <div class="topbar-left">
        <h1>관리자 페이지</h1>
        <p class="subtitle">닉네임 및 오답 기록 관리</p>
      </div>
      <div class="topbar-right">
        <button id="logoutBtn" class="secondary hidden" type="button">로그아웃</button>
        <a class="secondary-link" href="./index.html">시험 페이지로</a>
      </div>
    </header>

    <section class="card" id="loginCard">
      <h2>관리자 로그인</h2>
      <p class="help">허용된 관리자 이메일로 로그인하면 관리 기능이 열립니다.</p>
      <button id="googleLoginBtn" class="primary" type="button">Google로 로그인</button>
      <div id="loginInfo" class="help" style="margin-top:12px;"></div>
    </section>

    <section class="card hidden" id="blockedCard">
      <h2>접근 제한</h2>
      <p>허용된 관리자 이메일이 아닙니다.</p>
      <p class="help">관리자 이메일을 추가해야 이 페이지를 사용할 수 있습니다.</p>
    </section>

    <section class="card hidden" id="adminPanel">
      <div class="status-row">
        <div>로그인 계정 <strong id="adminEmailText">-</strong></div>
      </div>

      <div class="admin-grid">
        <div class="admin-box">
          <h3>관리자 이메일 추가</h3>
          <label for="newAdminEmail">새 관리자 이메일</label>
          <input id="newAdminEmail" type="text" placeholder="example@gmail.com" />
          <button id="addAdminBtn" class="primary" type="button">이메일 추가</button>
          <div id="adminList" class="admin-list"></div>
        </div>

        <div class="admin-box">
          <h3>닉네임 전체 기록 초기화</h3>
          <label for="resetNickname">닉네임</label>
          <input id="resetNickname" type="text" placeholder="초기화할 닉네임" />
          <p class="help">해당 닉네임 문서와 문제별 오답 기록을 모두 삭제합니다.</p>
          <button id="resetNicknameBtn" class="danger" type="button">닉네임 전체 초기화</button>
        </div>

        <div class="admin-box">
          <h3>오답 문항 기록만 초기화</h3>
          <label for="wrongResetNickname">닉네임</label>
          <input id="wrongResetNickname" type="text" placeholder="초기화할 닉네임" />
          <p class="help">닉네임 문서는 유지하고, wrongQuestions 하위 문서만 삭제합니다.</p>
          <button id="resetWrongBtn" class="warn" type="button">오답 기록 초기화</button>
        </div>
      </div>
    </section>
  </div>

  <script src="./firebase-config.js"></script>
  <script type="module" src="./admin.js"></script>
</body>
</html>
