<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자동차보수도장기능사 모의시험</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div>
        <h1>자동차보수도장기능사 모의시험</h1>
        <p class="subtitle">매 접속 시 랜덤 60문항 · 제한시간 60분</p>
      </div>
      <div class="topbar-right">
        <div class="timer-wrap">
          <span class="label">남은 시간</span>
          <span id="timer" class="timer">60:00</span>
        </div>
        <button id="submitBtn" class="primary">제출하기</button>
      </div>
    </header>

    <section id="introCard" class="card">
      <h2>시험 시작 전</h2>
      <div class="intro-grid">
        <div>
          <label for="nickname">닉네임</label>
          <input id="nickname" type="text" maxlength="12" placeholder="2~12자, 한글/영문/숫자" />
          <p class="help">동일 닉네임은 같은 사용자로 간주되어 오답 누적과 랭킹에 반영됩니다.</p>
        </div>
        <div class="rules">
          <p>• 문제는 매 접속 시 전체 문제은행에서 랜덤 60문항이 출제됩니다.</p>
          <p>• 제출 후 정답과 해설이 공개됩니다.</p>
          <p>• 같은 닉네임으로 같은 문제를 3회 이상 틀리면 해설 위에 알림이 표시됩니다.</p>
        </div>
      </div>
      <div class="intro-actions">
        <button id="startBtn" class="primary">시험 시작</button>
      </div>
    </section>

    <section id="statusCard" class="card hidden">
      <div class="status-row">
        <div><strong id="nicknameDisplay"></strong></div>
        <div>응답 완료 <strong id="answeredCount">0</strong>/60</div>
      </div>
      <div id="progressBar" class="progress"><span></span></div>
    </section>

    <main id="examContainer" class="hidden"></main>

    <section id="resultCard" class="card hidden">
      <h2>시험 결과</h2>
      <div class="result-grid">
        <div class="metric"><span>점수</span><strong id="scoreText">0점</strong></div>
        <div class="metric"><span>정답 수</span><strong id="correctText">0 / 60</strong></div>
        <div class="metric"><span>소요 시간</span><strong id="elapsedText">00:00</strong></div>
        <div class="metric"><span>랭킹 반영</span><strong id="rankingStatus">대기 중</strong></div>
      </div>
      <div class="result-actions">
        <button id="retryBtn" class="secondary">새 문제로 다시 시작</button>
      </div>
      <div class="rank-card">
        <h3>랭킹 TOP 10</h3>
        <div id="rankingList" class="ranking-list"></div>
      </div>
    </section>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="./firebase-config.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
