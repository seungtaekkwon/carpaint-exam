<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자동차보수도장기능사 모의시험</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="toast" class="toast hidden" role="alert" aria-live="assertive"></div>

  <div id="app">
    <header class="topbar">
      <div class="topbar-left">
        <h1>자동차보수도장기능사 모의시험</h1>
        <p class="subtitle">매 접속 시 랜덤 60문항 · 제한시간 60분</p>
      </div>
      <div class="topbar-right">
        <div class="timer-wrap">
          <span class="label">남은 시간</span>
          <span id="timer" class="timer">60:00</span>
        </div>
        <button id="submitBtn" class="primary soft-disabled" type="button" aria-disabled="true" title="모든 문항에 답변을 체크해주세요">제출하기</button>
      </div>
    </header>

    <section id="introCard" class="card">
      <div class="intro-grid">
        <div>
          <label for="nickname">닉네임</label>
          <input id="nickname" type="text" maxlength="12" placeholder="2~12자, 한글/영문/숫자" />
          <p class="help">시험 시작 전에 닉네임을 입력해 주세요. 같은 닉네임이면 문제별 오답 기록이 이어집니다.</p>
          <p class="help"><a href="./admin.html">관리자 페이지</a></p>
        </div>
        <div class="rules">
          <p>• 매 접속 시 랜덤 60문항이 출제됩니다.</p>
          <p>• 제한시간은 60분입니다.</p>
          <p>• 제출 후 정답과 해설이 공개됩니다.</p>
          <p>• 같은 닉네임으로 같은 문제를 3회 이상 틀리면 해설 위에 경고가 표시됩니다.</p>
        </div>
      </div>
      <div class="intro-actions">
        <button id="startBtn" class="primary" type="button">시험 시작</button>
      </div>
    </section>

    <section id="statusCard" class="card hidden">
      <div class="status-row">
        <div>답변 완료 <strong id="answeredCount">0</strong> / 60</div>
        <div>닉네임 <strong id="nicknameDisplay">-</strong></div>
      </div>
      <div id="progressBar" class="progress"><span></span></div>
    </section>

    <main id="examContainer" class="hidden"></main>

    <section id="resultCard" class="card hidden">
      <h2>시험 결과</h2>
      <div class="result-grid simple">
        <div class="metric">
          <span>총점</span>
          <strong id="scoreText">0점</strong>
        </div>
        <div class="metric">
          <span>정답 수</span>
          <strong id="correctText">0 / 60</strong>
        </div>
        <div class="metric">
          <span>소요 시간</span>
          <strong id="elapsedText">00:00</strong>
        </div>
      </div>

      <div class="result-actions">
        <button id="downloadWrongPdfBtn" class="primary" type="button">오답노트 다운로드</button>
        <button id="retryBtn" class="secondary" type="button">새 시험 시작</button>
      </div>
    </section>
  </div>

  <script src="./firebase-config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
